version: '3.8'

services:
  backend:
    build: ./backend
    container_name: montecarlo-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: montecarlo-web
    ports:
      - "80:80" # La web se verá directamente en http://localhost
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped